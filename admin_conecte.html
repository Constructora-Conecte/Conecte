<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Conecte</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#111;color:#fff;margin:0}
button{background:red;color:white;border:none;padding:10px;margin:5px}
input{padding:6px;margin:5px}
.sidebar{position:fixed;width:200px;height:100vh;background:#000;padding:20px}
.content{margin-left:220px;padding:20px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #444;padding:5px}
</style>
</head>

<body>

<div id="login">
<h2>Login Conecte</h2>
<button onclick="handleAuthClick()">Login con Google</button>

<div id="login2" style="display:none">
<input id="correo" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app" style="display:none">
<div class="sidebar">
<button onclick="show('home')">Inicio</button>
<button onclick="show('cot')">Cotizaciones</button>
<button onclick="logout()">Salir</button>
</div>

<div class="content">

<div id="home">
<h2>Bienvenido</h2>
<p id="userInfo"></p>
</div>

<div id="cot" style="display:none">
<h2>Cotización</h2>

<input id="cliente" placeholder="RFC Cliente">
<input id="desc" placeholder="Descripción">

<table>
<thead>
<tr>
<th>Concepto</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Importe</th>
<th></th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<button onclick="add()">Agregar</button>

<h3>Subtotal: <span id="sub">0</span></h3>
<h3>IVA: <span id="iva">0</span></h3>
<h2>Total: <span id="tot">0</span></h2>

<button onclick="guardar()">Guardar</button>
<button onclick="pdf()">PDF</button>

</div>

</div>
</div>

<script>
const CLIENT_ID = "413269286189-g75s5kq24g1c96en6pb4uvc9059062u7.apps.googleusercontent.com";
const API_KEY = "AIzaSyA2mDnl0kGWBdltS488u_5ZaXPWJFS18Ww";
const SHEET_ID = "1YhLwYYo_7C_1qB1NqU-puwMp8_TG1BfQcpkaAqJG8to";

let tokenClient;
let accessToken = null;
let usuario = null;

// INIT
window.onload = ()=>{
gapi.load('client', async ()=>{
await gapi.client.init({
apiKey: API_KEY,
discoveryDocs:["https://sheets.googleapis.com/$discovery/rest?version=v4"]
});
});
};

// LOGIN GOOGLE
function handleAuthClick(){
tokenClient = google.accounts.oauth2.initTokenClient({
client_id: CLIENT_ID,
scope: "https://www.googleapis.com/auth/spreadsheets",
callback: (resp)=>{
accessToken = resp.access_token;
document.getElementById("login2").style.display="block";
}
});
tokenClient.requestAccessToken();
}

// LOGIN INTERNO
async function login(){
let correo = document.getElementById("correo").value;
let pass = document.getElementById("pass").value;

let res = await gapi.client.sheets.spreadsheets.values.get({
spreadsheetId: SHEET_ID,
range: "usuarios!A2:D"
});

let data = res.result.values;

let user = data.find(r=>r[0]==correo && r[1]==pass);

if(!user){ alert("Error"); return; }

if(user[2]=="Operativo"){ alert("Sin acceso"); return; }

usuario = correo;

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("userInfo").innerText = correo;
}

// UI
function show(x){
document.getElementById("home").style.display="none";
document.getElementById("cot").style.display="none";
document.getElementById(x).style.display="block";
}

function logout(){ location.reload(); }

// TABLA
function add(){
let tr = document.createElement("tr");

tr.innerHTML=`
<td><input></td>
<td><input type="number" value="1" onchange="calc()"></td>
<td><input type="number" value="0" onchange="calc()"></td>
<td class="imp">0</td>
<td><button onclick="this.parentNode.parentNode.remove();calc()">X</button></td>
`;

document.getElementById("body").appendChild(tr);
}

// CALC
function calc(){
let rows=document.querySelectorAll("#body tr");
let sub=0;

rows.forEach(r=>{
let c=r.children[1].children[0].value;
let p=r.children[2].children[0].value;
let imp=c*p;
r.children[3].innerText=imp.toFixed(2);
sub+=imp;
});

let iva=sub*0.16;
let tot=sub+iva;

document.getElementById("sub").innerText=sub.toFixed(2);
document.getElementById("iva").innerText=iva.toFixed(2);
document.getElementById("tot").innerText=tot.toFixed(2);
}

// GUARDAR REAL
async function guardar(){
let cliente=document.getElementById("cliente").value;
let desc=document.getElementById("desc").value;

let sub=document.getElementById("sub").innerText;
let iva=document.getElementById("iva").innerText;
let tot=document.getElementById("tot").innerText;

let id="CONE-COT"+Date.now();

await gapi.client.sheets.spreadsheets.values.append({
spreadsheetId:SHEET_ID,
range:"Cotizaciones!A2",
valueInputOption:"RAW",
resource:{
values:[[id,new Date().toLocaleDateString(),cliente,desc,sub,iva,tot,usuario]]
}
});

alert("Guardado");
}

// PDF
async function pdf(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

let cliente=document.getElementById("cliente").value;
let desc=document.getElementById("desc").value;

doc.text("CONSTRUCTORA CONECTE",10,10);
doc.text("Cliente: "+cliente,10,20);
doc.text("Trabajo: "+desc,10,30);

let y=40;

document.querySelectorAll("#body tr").forEach(r=>{
let con=r.children[0].children[0].value;
let imp=r.children[3].innerText;
doc.text(con+" $"+imp,10,y);
y+=10;
});

let sub=document.getElementById("sub").innerText;
let iva=document.getElementById("iva").innerText;
let tot=document.getElementById("tot").innerText;

y+=10;
doc.text("Subtotal: "+sub,10,y);
y+=10;
doc.text("IVA: "+iva,10,y);
y+=10;
doc.text("TOTAL: "+tot,10,y);

doc.save("cotizacion.pdf");
}
</script>

</body>
</html>
